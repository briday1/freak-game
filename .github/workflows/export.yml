name: Export → Itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.1

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Web
        run: |
          mkdir -p build/web
          ./godot --headless --export-release "Web" "$PWD/build/web/index.html"

      - name: Install butler
        run: |
          curl -sL -o butler.zip \
            "$(curl -s https://api.github.com/repos/itchio/butler/releases/latest \
               | python3 -c "import sys,json; [print(a['browser_download_url']) for a in json.load(sys.stdin)['assets'] if 'linux-amd64' in a['name']]")"
          unzip -q butler.zip
          chmod +x butler

      - name: Push to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_IO_TOKEN }}
        run: |
          ./butler push build/web the-ubermunch/freak-game:web \
            --userversion "$(date -u +%Y%m%d)-${{ github.run_number }}"
